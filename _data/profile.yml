bio: >
  I operate at the threshold between parametric design intelligence and
  large-scale architectural production. My practice builds autonomous
  pipelines that translate generative AI outputs into IFC-compliant BIM
  deliverables — collapsing the distance between conceptual massing and
  fabrication-ready documentation. I have directed computational workflows
  for supertall typologies in the 300m–500m range across Southeast Asia,
  the Gulf, and Central Europe.

