- id: "facade-lattice"
  title: "Lattice Façade Optimization Engine"
  subtitle: "Structural Skin · 310m Tower · Frankfurt"
  year: "2024"
  status: "Schematic Design"
  tags: ["Grasshopper", "Karamba3D", "Façade", "Structural"]
  category: "tower"
  featured: true
  description: >
    A bidirectional optimization loop between Grasshopper geometry and
    Karamba3D FEA — evolving a diagrid façade lattice on a 310m Frankfurt
    commercial tower. The system runs multi-objective genetic algorithms
    (Wallacei) against structural deflection limits, daylight factor targets,
    and curtain wall panel count minimization, converging on a Pareto-optimal
    façade geometry without human intervention.
